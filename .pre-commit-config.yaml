repos:
  - repo: local
    hooks:
      - id: typecheck
        name: TypeScript type-check
        entry: npx tsc --noEmit
        language: system
        types_or: [ts, tsx]
        pass_filenames: false

      - id: file-length
        name: Check file length (max 300 lines)
        entry: bash scripts/check-file-length.sh
        language: system
        types: [text]
