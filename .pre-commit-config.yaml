repos:
  - repo: local
    hooks:
      - id: prettier
        name: Prettier format
        entry: bash scripts/prettier-pre-commit.sh
        language: system
        types_or: [javascript, jsx, ts, tsx, json, css, markdown, yaml]

      - id: typecheck
        name: TypeScript type-check
        entry: npx tsc --noEmit
        language: system
        types_or: [ts, tsx]
        pass_filenames: false

      - id: file-length
        name: Check file length (max 300 lines)
        entry: bash scripts/check-file-length.sh
        language: system
        types: [text]

      - id: lint-architecture
        name: Architecture dependency rules
        entry: bash scripts/lint-architecture.sh
        language: system
        pass_filenames: false
        types_or: [ts, tsx]
